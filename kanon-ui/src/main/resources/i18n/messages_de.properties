command.overview.model-visibility=Die Modellsichtbarkeit zeigt, welche Modellroute Kanon ausgewählt hat und warum, einschließlich Fallback-Routing.
command.overview.external-annotation=Wenn spezialisierte Annotation erforderlich ist, kann Kanon Arbeit an Label Studio oder CVAT senden und normalisierte Ergebnisse vor der finalen Freigabe zurücksynchronisieren.
command.overview.source-of-truth=Kanon bleibt die Quelle der Wahrheit für Fallstatus, Richtlinien, Workflows, Nachweise, Audit und finale Freigabe.

command.overview.summary=Operational workspace for workflow state, review tasks, evidence, source connectors, and model visibility. Start from the workflow board
command.overview.workflow-board=The workflow board shows the current state of each case so operators can see what is pending, blocked, approved, or ready for export.
command.overview.human-inbox=The human task inbox is where reviewers start review, complete review, approve, reject, escalate, or mark work as export ready.
command.overview.evidence-records=Each review action records evidence so the decision history remains visible in Kanon.
command.overview.evidence-explorer=The evidence explorer lets users filter by case and inspect the events that explain how a case moved through the system.
command.overview.annotation-diff=The annotation diff highlights before and after values recorded on evidence events.
command.overview.source-connectors=Source connectors show the available intake channels that can feed work into the control plane.
command.overview.model-visibility=Model visibility shows which model route Kanon selected and why, including fallback routing.
command.overview.external-annotation=When specialist annotation is required, Kanon can send work to Label Studio or CVAT, then sync normalized results back before final approval.
command.overview.source-of-truth=Kanon remains the source of truth for case state, policy, workflow, evidence, audit, and final approval.

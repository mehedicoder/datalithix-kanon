spring:
  datasource:
    url: ${KANON_POSTGRES_URL:jdbc:postgresql://localhost:5432/datalithix_kanon}
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${KANON_POSTGRES_MAX_POOL_SIZE:10}
      minimum-idle: ${KANON_POSTGRES_MIN_IDLE:2}
      connection-timeout: ${KANON_POSTGRES_CONNECTION_TIMEOUT_MS:30000}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    mongodb:
      uri: ${KANON_MONGODB_URI:mongodb://localhost:27017/datalithix_kanon}

management:
  health:
    db:
      enabled: true
    mongo:
      enabled: true

kanon:
  object-storage:
    enabled: ${KANON_OBJECT_STORAGE_ENABLED:true}
    provider: s3-compatible
    endpoint: ${KANON_OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
    region: ${KANON_OBJECT_STORAGE_REGION:us-east-1}
    bucket: ${KANON_OBJECT_STORAGE_BUCKET:kanon-assets}
    access-key: ${KANON_OBJECT_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${KANON_OBJECT_STORAGE_SECRET_KEY:minioadmin}
    path-style-access: true
    tenant-prefix-template: tenants/{tenantId}

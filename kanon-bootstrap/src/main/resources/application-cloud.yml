spring:
  datasource:
    url: ${KANON_POSTGRES_URL}
    username: ${KANON_POSTGRES_USERNAME}
    password: ${KANON_POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${KANON_POSTGRES_MAX_POOL_SIZE:20}
      minimum-idle: ${KANON_POSTGRES_MIN_IDLE:4}
      connection-timeout: ${KANON_POSTGRES_CONNECTION_TIMEOUT_MS:30000}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    mongodb:
      uri: ${KANON_MONGODB_URI}

management:
  health:
    db:
      enabled: true
    mongo:
      enabled: true

vaadin:
  productionMode: true

kanon:
  object-storage:
    enabled: ${KANON_OBJECT_STORAGE_ENABLED:true}
    provider: ${KANON_OBJECT_STORAGE_PROVIDER:s3-compatible}
    endpoint: ${KANON_OBJECT_STORAGE_ENDPOINT:}
    region: ${KANON_OBJECT_STORAGE_REGION:us-east-1}
    bucket: ${KANON_OBJECT_STORAGE_BUCKET:kanon-assets}
    access-key: ${KANON_OBJECT_STORAGE_ACCESS_KEY:}
    secret-key: ${KANON_OBJECT_STORAGE_SECRET_KEY:}
    path-style-access: ${KANON_OBJECT_STORAGE_PATH_STYLE_ACCESS:true}
    tenant-prefix-template: ${KANON_OBJECT_STORAGE_TENANT_PREFIX_TEMPLATE:tenants/{tenantId}}
